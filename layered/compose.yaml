services:
  app:
    build: .
    container_name: go-architecture-sample-layered-app
    ports:
      - "8080:8080"
    environment:
      APP_PORT: 8080
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: app
      DB_PASSWORD: password
      DB_NAME: app_db
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.4
    container_name: go-architecture-sample-layered-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: app_db
      MYSQL_USER: app
      MYSQL_PASSWORD: password
      TZ: Asia/Tokyo
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql-data:
  go-mod-cache:
